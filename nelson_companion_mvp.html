function timeToMinutes(t){const[h,m]=t.split(':').map(Number);return h*60+m;}

function getCurrentSlotIndex(slots,nowMin){
  let best=-1;
  for(let i=0;i<slots.length;i++){
    const sm=timeToMinutes(slots[i].time);
    if(sm<=nowMin)best=i;
  }
  return best;
}

function getNextSlotIndex(slots,nowMin){
  for(let i=0;i<slots.length;i++){
    if(timeToMinutes(slots[i].time)>nowMin)return i;
  }
  return -1;
}

function speak(text){
  if(!window.speechSynthesis)return;
  window.speechSynthesis.cancel();
  const utt=new SpeechSynthesisUtterance(text);
  utt.lang='es-ES';utt.rate=0.85;utt.pitch=1.0;utt.volume=1.0;
  const voices=window.speechSynthesis.getVoices();
  const esVoice=voices.find(v=>v.lang.startsWith('es')&&v.name.toLowerCase().includes('female'))
    ||voices.find(v=>v.lang.startsWith('es'));
  if(esVoice)utt.voice=esVoice;
  window.speechSynthesis.speak(utt);
}

function riskBg(r){
  return r==='red'?'var(--color-background-danger)':r==='green'?'var(--color-background-success)':'var(--color-background-warning)';
}
function riskText(r){
  return r==='red'?'var(--color-text-danger)':r==='green'?'var(--color-text-success)':'var(--color-text-warning)';
}
function riskBorder(r){
  return r==='red'?'var(--color-border-danger)':r==='green'?'var(--color-border-success)':'var(--color-border-warning)';
}

          onClick:()=>{
            const h=now.getHours();
            const msg=h<12?'Buenos días Nelson. ¿Cómo te sientes hoy?':
              h<18?'Buenas tardes Nelson. ¿Cómo va el día?':
              'Buenas noches Nelson. Casi es hora de descansar.';
            doSpeak(msg);
          },
          style:{padding:'14px',fontSize:14,cursor:'pointer',
            background:'var(--color-background-secondary)',
            border:'0.5px solid var(--color-border-secondary)',
            borderRadius:'var(--border-radius-lg)',textAlign:'center',fontWeight:500}
        },'🔊 Saludo')
      ),

      React.createElement('div',{style:{
        padding:'0.75rem',
        background:'var(--color-background-danger)',
        borderRadius:'var(--border-radius-md)',
        border:'0.5px solid var(--color-border-danger)'
      }},
        React.createElement('p',{style:{margin:'0 0 6px',fontSize:12,fontWeight:500,
          color:'var(--color-text-danger)'}},
          'Llamar a Christian si:'),
        React.createElement('p',{style:{margin:0,fontSize:12,color:'var(--color-text-danger)',lineHeight:1.6}},
          '• Presión baja de 95/60\n• Corazón muy lento (menos de 48)\n• Mareo fuerte o caída\n• Habla diferente a lo normal')
      )
    )
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
